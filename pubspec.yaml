name: quiz_mentor_ai
description: An AI-powered educational companion for students aged 11-24, offering personalized quizzes, career guidance, and gamified learning experiences
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^12.1.3
  
  # Animations
  flutter_animate: ^4.2.0+1
  
  # UI Components
  cupertino_icons: ^1.0.2
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # HTTP & API
  dio: ^5.3.2
  
  # JSON & Data
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1
  
  # Audio & Haptic
  audioplayers: ^5.2.1
  vibration: ^1.8.4
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Cryptography for deterministic hashing
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  # App Assets
  assets:
    - assets/images/
    - assets/sounds/
    - assets/animations/
  
  # Modern fonts for students and young adults
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700